<mat-toolbar class="toolbar">
  <span>Role</span>
  <div id="nav">
    <a>Pesquisar</a>
  </div>
</mat-toolbar>

<mat-card>
  <mat-card-content>
    <form [formGroup]="form" class="min-width">
      <mat-form-field class="full-widht">
        <input matInput placeholder="Titulo" formControlName="titulo" />
      </mat-form-field>

      <mat-form-field class="full-widht">
        <input matInput placeholder="Local" formControlName="local" />
      </mat-form-field>

      <mat-form-field class="full-widht">
        <mat-label>Categoria</mat-label>
        <mat-select formControlName="categoria">
          <mat-option value="Cultura">Amostra cultural</mat-option>
          <mat-option value="educação"
            >Educação: Palestras, cursos ou workshops
          </mat-option>
          <mat-option value="gastronomia"
            >Gastronomia, comidas e bebidas</mat-option
          >
          <mat-option value="lazer">Lazer, jogos e torneios</mat-option>
          <mat-option value="musica">Música, shows e apresentações</mat-option>
          <mat-option value="passeio"
            >Passeios, excursões ou viagens</mat-option
          >
          <mat-option value="religião">Religião, missas ou culto</mat-option>
          <mat-option value="saude">Saúde, nutrição e bem-estar</mat-option>
          <mat-option value="outros">Outros...</mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field class="full-widht">
        <input matInput placeholder="Descrição" formControlName="descricao" />
      </mat-form-field>

      <div fxLayout="row wrap">
        <div fxFlex="50" fxFill fxLayoutAlign="start center">
          <mat-form-field class="full-widht">
            <input matInput [matDatepicker]="picker" formControlName="data" />
            <mat-hint>MM/DD/YYYY</mat-hint>
            <mat-datepicker-toggle
              matIconSuffix
              [for]="picker"
            ></mat-datepicker-toggle>
            <mat-datepicker #picker></mat-datepicker>
          </mat-form-field>
        </div>
        <div fxFlex="50" fxFill fxLayoutAlign="start center">
          <mat-form-field>
            <mat-label>Horário</mat-label>
            <input matInput type="time" placeholder="" formControlName="horario" #time/>
        </mat-form-field>
        </div>
      </div>

      <mat-form-field class="full-widht">
        <input matInput placeholder="Valor" formControlName="valor" />
      </mat-form-field>

      <mat-form-field class="full-widht">
        <input matInput placeholder="Url da Imagem" formControlName="roleUrl" />
      </mat-form-field>
    </form>
  </mat-card-content>

  <mat-card-actions>
    <button mat-raised-button color="primary" (click)="onSubmit()">
      Salvar
    </button>
    <button mat-raised-button (click)="onCancel()">Cancelar</button>
  </mat-card-actions>
</mat-card>
