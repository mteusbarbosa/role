<div class="content">
  <div fxLayout="row wrap" fxLayoutGap="16px grid" >
    <div fxFlex="25%" fxFlex.xs="100%" fxFlex.sm="33%" *ngFor="let role of roles" >
      <mat-card class="mat-elevation-z4"   >
        <mat-card-header>
          <mat-card-title>
            {{ role.titulo }}
          </mat-card-title>
          <mat-card-subtitle>
            {{ role.local }}
          </mat-card-subtitle>

          <!-- Editar role -->
          <button mat-icon-button color="accent" aria-label="Editar role">
            <mat-icon (click)="onEdit(role)">edit</mat-icon>
          </button>

          <!-- Deletar role -->
          <button mat-icon-button color="accent" aria-label="Remover role">
            <mat-icon (click)="onDelete(role)">delete</mat-icon>
          </button>
        </mat-card-header>

        <mat-card-content>
          <img mat-card-image [src]="role.roleUrl" [alt]="role.descricao" />
          <p class="descricao">
            {{ role.descricao }}
          </p>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button>VER MAIS</button>
        </mat-card-actions>
      </mat-card>
    </div>
  </div>
</div>
